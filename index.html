<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AiScan Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <div class="container">
    <h1>🔍 AiScan</h1>

    <textarea id="inputText" placeholder="Paste or type text..."></textarea>

    <div class="buttons">
      <button onclick="runTool('uppercase')">UPPERCASE</button>
      <button onclick="runTool('lowercase')">lowercase</button>
      <button onclick="runTool('removeSpace')">Remove Spaces</button>
    </div>

    <pre id="output"></pre>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
